<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Brainstorm App - Login</title>
  <link rel="stylesheet" href="css/style.css">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
</head>
<body>
  <div class="auth-wrapper">
    <!-- Login Form -->
    <div id="loginForm" class="auth-panel glass-panel animate-fade-in">
      <h1>Welcome Back</h1>
      <p class="subtitle">Enter your details to access your brainstorming sessions.</p>
      
      <form id="form-login">
        <input type="email" id="login-email" class="glass-input" placeholder="Email Address" required>
        <input type="password" id="login-password" class="glass-input" placeholder="Password" required>
        <button type="submit" class="btn btn-primary" style="width: 100%;">Login</button>
      </form>
      <div style="text-align: center; margin-top: 24px; font-size: 14px; color: var(--text-muted);">
        Don't have an account? <a href="#" id="showRegister" style="color: var(--primary); text-decoration: none;">Sign up</a>
      </div>
    </div>

    <!-- Register Form -->
    <div id="registerForm" class="auth-panel glass-panel animate-fade-in" style="display: none;">
      <h1>Create Account</h1>
      <p class="subtitle">Join teams and start brainstorming brilliant ideas.</p>
      
      <form id="form-register">
        <input type="text" id="reg-name" class="glass-input" placeholder="Full Name" required>
        <input type="email" id="reg-email" class="glass-input" placeholder="Email Address" required>
        <input type="password" id="reg-password" class="glass-input" placeholder="Password" required>
        <button type="submit" class="btn btn-primary" style="width: 100%;">Register</button>
      </form>
      <div style="text-align: center; margin-top: 24px; font-size: 14px; color: var(--text-muted);">
        Already have an account? <a href="#" id="showLogin" style="color: var(--primary); text-decoration: none;">Log in</a>
      </div>
    </div>
  </div>

  <script src="js/api.js"></script>
  <script src="js/auth.js"></script>
</body>
</html>
